[pytest]
# Pytest configuration for Runner (Python)

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage is enforced in CI via explicit command flags.
addopts =
    --strict-markers
    --strict-config

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_docker: marks tests that require Docker daemon

# Ignore
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    venv
    .venv

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
