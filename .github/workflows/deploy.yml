name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/control-plane

jobs:
  # Build and push Control Plane Docker image
  build-control-plane:
    name: Build Control Plane
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/control-plane/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Control Plane to Cloud Run (optional - uncomment if using GCP)
  # deploy-control-plane:
  #   name: Deploy Control Plane
  #   runs-on: ubuntu-latest
  #   needs: build-control-plane
  #   environment: production
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Authenticate to Google Cloud
  #       uses: google-github-actions/auth@v2
  #       with:
  #         credentials_json: ${{ secrets.GCP_SA_KEY }}
  #
  #     - name: Deploy to Cloud Run
  #       uses: google-github-actions/deploy-cloudrun@v2
  #       with:
  #         service: execution-layer-control-plane
  #         region: us-central1
  #         image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
  #         env_vars: |
  #           NODE_ENV=production
  #           SUPABASE_URL=${{ secrets.SUPABASE_URL }}
  #           SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  #           MASTER_ENCRYPTION_KEY=${{ secrets.MASTER_ENCRYPTION_KEY }}

  # Deploy Modal Runner
  deploy-runner:
    name: Deploy Modal Runner
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: services/runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/runner/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy src/modal_app.py

  # Web + API deployed via Render Blueprint (render.yaml)
  # Render auto-deploys on push to main
  # No action needed here - Render handles zero-downtime deploys

  # Notify on completion
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-control-plane, deploy-runner]
    if: always()

    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.build-control-plane.result }}" == "success" && "${{ needs.deploy-runner.result }}" == "success" ]]; then
            echo "All deployments successful"
          else
            echo "Some deployments failed"
            exit 1
          fi
