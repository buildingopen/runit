name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Control Plane Docker image
  build-control-plane:
    name: Build Control Plane
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Control Plane to Cloud Run (runs only when GCP_SA_KEY secret is configured)
  deploy-control-plane:
    name: Deploy Control Plane
    runs-on: ubuntu-latest
    needs: build-control-plane
    if: ${{ vars.DEPLOY_GCP == 'true' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: runit-control-plane
          region: us-central1
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            MASTER_ENCRYPTION_KEY=${{ secrets.MASTER_ENCRYPTION_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  # Notify on completion
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-control-plane, deploy-control-plane]
    if: always()

    steps:
      - name: Check status
        run: |
          BUILD="${{ needs.build-control-plane.result }}"
          DEPLOY_CP="${{ needs.deploy-control-plane.result }}"

          if [[ "$BUILD" == "success" && ("$DEPLOY_CP" == "success" || "$DEPLOY_CP" == "skipped") ]]; then
            echo "All deployments successful"
          else
            echo "Some deployments failed (build=$BUILD, control-plane=$DEPLOY_CP)"
            exit 1
          fi
