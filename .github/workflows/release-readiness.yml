name: Release Readiness

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build shared workspace package
        run: npm run build --workspace=packages/shared

      - name: Build
        run: npm run build

      - name: Verify workspace gates
        run: npm run verify
        env:
          NODE_ENV: test
          MASTER_ENCRYPTION_KEY: dGVzdC1tYXN0ZXIta2V5LTMyLWJ5dGVzLWxvbmch
          RUNIT_DATA_DIR: ${{ runner.temp }}/runit-release-data

      - name: Golden path E2E
        run: npx playwright test tests/e2e/golden-path.spec.ts
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3001
          MASTER_ENCRYPTION_KEY: dGVzdC1tYXN0ZXIta2V5LTMyLWJ5dGVzLWxvbmch
          RUNIT_DATA_DIR: ${{ runner.temp }}/runit-release-data

      - name: Start local stack for smoke checks
        run: |
          (cd services/control-plane && NODE_ENV=test COMPUTE_BACKEND=docker RUNIT_DATA_DIR="${{ runner.temp }}/runit-release-data" npm run dev > /tmp/runit-control-plane.log 2>&1 & echo $! > /tmp/runit-control-plane.pid)
          (cd apps/web && NEXT_PUBLIC_API_URL=http://localhost:3001 npm run dev -- -p 3000 > /tmp/runit-web.log 2>&1 & echo $! > /tmp/runit-web.pid)

          for url in http://localhost:3001/health http://localhost:3000; do
            for attempt in {1..60}; do
              if curl --silent --fail "$url" > /dev/null; then
                break
              fi
              sleep 2
            done
            curl --silent --fail "$url" > /dev/null
          done

      - name: Smoke checks (web + api contracts)
        run: npm run smoke:golden
        env:
          API_BASE_URL: http://localhost:3001
          WEB_BASE_URL: http://localhost:3000
          RUNIT_DATA_DIR: ${{ runner.temp }}/runit-release-data

      - name: Verify PRR artifacts
        run: npm run verify:prr-artifacts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Manual checklist reminder
        if: always()
        run: |
          echo "## Manual Release Checklist Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Complete docs/RELEASE_CHECKLIST.md before shipping." >> $GITHUB_STEP_SUMMARY
          echo "Attach completed PRR scorecard from docs/PRR_SCORECARD.md." >> $GITHUB_STEP_SUMMARY
          echo "Artifact verification (`npm run verify:prr-artifacts`) has already run in this workflow." >> $GITHUB_STEP_SUMMARY
