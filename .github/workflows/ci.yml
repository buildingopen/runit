name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # TypeScript: Lint, Build, Test
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Align Vitest coverage provider version
        run: npm run align:vitest-provider

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          NODE_ENV: test
          MASTER_ENCRYPTION_KEY: dGVzdC1tYXN0ZXIta2V5LTMyLWJ5dGVzLWxvbmch

      - name: TypeScript coverage thresholds (auto-skip if provider missing)
        run: npm run verify:ts-coverage

  # Python Runner: Lint and Test
  python-runner:
    name: Python Runner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/runner/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Test with pytest
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=77

  # Python SDK: Test
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/runner/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/runner/sdk/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test with pytest
        run: PYTHONPATH=. pytest tests/ -v --tb=short --cov=runit --cov-report=term-missing --cov-report=xml --cov-fail-under=77

  # Golden path E2E tests (blocking)
  e2e:
    name: Golden Path E2E
    runs-on: ubuntu-latest
    needs: [typescript, python-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build shared workspace package
        run: npm run build --workspace=packages/shared

      - name: Build
        run: npm run build

      - name: Run golden path E2E test
        run: npx playwright test tests/e2e/golden-path.spec.ts
        env:
          CI: true
          MASTER_ENCRYPTION_KEY: dGVzdC1tYXN0ZXIta2V5LTMyLWJ5dGVzLWxvbmch
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Start local stack for smoke checks
        run: |
          (cd services/control-plane && NODE_ENV=test COMPUTE_BACKEND=docker RUNIT_DATA_DIR="${{ runner.temp }}/runit-e2e-data" npm run dev > /tmp/runit-control-plane.log 2>&1 & echo $! > /tmp/runit-control-plane.pid)
          (cd apps/web && NEXT_PUBLIC_API_URL=http://localhost:3001 npm run dev -- -p 3000 > /tmp/runit-web.log 2>&1 & echo $! > /tmp/runit-web.pid)

          for url in http://localhost:3001/health http://localhost:3000; do
            for attempt in {1..60}; do
              if curl --silent --fail "$url" > /dev/null; then
                break
              fi
              sleep 2
            done
            curl --silent --fail "$url" > /dev/null
          done

      - name: Run smoke checks (web + api contracts)
        run: npm run smoke:golden
        env:
          API_BASE_URL: http://localhost:3001
          WEB_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
