# Render Blueprint - RunIt
# https://render.com/docs/blueprint-spec
#
# Deploy RunIt to Render with: render blueprint apply

services:
  # Hono Control Plane API
  - type: web
    name: runit-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: COMPUTE_BACKEND
        value: docker
      - key: RUNIT_MODE
        value: oss
      - key: MASTER_ENCRYPTION_KEY
        fromGroup: encryption
      - key: API_KEY
        fromGroup: auth
    autoDeploy: true
    branch: main

envVarGroups:
  - name: encryption
    envVars:
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true

  - name: auth
    envVars:
      - key: API_KEY
        sync: false
