version: "3.8"

services:
  control-plane:
    build:
      context: ..
      dockerfile: services/control-plane/Dockerfile
    container_name: runtime-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
