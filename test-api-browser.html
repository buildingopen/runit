<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Layer v0 - API Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status.offline {
            background: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .response.success {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .response.error {
            border-color: #ef4444;
            background: #fef2f2;
            color: #dc2626;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Execution Layer v0 - API Test Interface</h1>
            <p style="color: #6b7280; margin: 10px 0;">Live API testing dashboard</p>
            <span class="status" id="api-status">● Checking...</span>
        </div>

        <div class="grid">
            <!-- Health Check -->
            <div class="card">
                <h2>1️⃣ Health Check</h2>
                <button onclick="checkHealth()">Check API Health</button>
                <div id="health-response" class="response" style="display:none;"></div>
            </div>

            <!-- API Info -->
            <div class="card">
                <h2>2️⃣ API Info</h2>
                <button onclick="getApiInfo()">Get API Information</button>
                <div id="info-response" class="response" style="display:none;"></div>
            </div>

            <!-- List Projects -->
            <div class="card">
                <h2>3️⃣ List Projects</h2>
                <button onclick="listProjects()">List All Projects</button>
                <div id="projects-response" class="response" style="display:none;"></div>
            </div>

            <!-- Create Project -->
            <div class="card">
                <h2>4️⃣ Create Project</h2>
                <input type="text" id="project-name" placeholder="Project name (e.g., My API)" value="Test Project">
                <button onclick="createProject()">Create New Project</button>
                <div id="create-response" class="response" style="display:none;"></div>
            </div>

            <!-- Test Secrets -->
            <div class="card">
                <h2>5️⃣ Test Secrets</h2>
                <button onclick="testSecrets()">Test Secrets Endpoint</button>
                <div id="secrets-response" class="response" style="display:none;"></div>
            </div>

            <!-- Test Context -->
            <div class="card">
                <h2>6️⃣ Test Context</h2>
                <input type="text" id="context-url" placeholder="URL to fetch" value="https://example.com">
                <button onclick="testContext()">Fetch Context from URL</button>
                <div id="context-response" class="response" style="display:none;"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="card">
            <h2>📊 Test Statistics</h2>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-tests">0</div>
                    <div class="stat-label">Total Tests</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="success-count">0</div>
                    <div class="stat-label">Successful</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="error-count">0</div>
                    <div class="stat-label">Errors</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';
        let totalTests = 0;
        let successCount = 0;
        let errorCount = 0;
        let lastProjectId = null;

        // Auto-check health on load
        window.addEventListener('load', () => {
            checkHealth();
        });

        function updateStats() {
            document.getElementById('total-tests').textContent = totalTests;
            document.getElementById('success-count').textContent = successCount;
            document.getElementById('error-count').textContent = errorCount;
        }

        async function makeRequest(url, options = {}) {
            totalTests++;
            updateStats();

            const responseDiv = options.responseDiv;
            responseDiv.style.display = 'block';
            responseDiv.textContent = '⏳ Loading...';
            responseDiv.className = 'response';

            try {
                const response = await fetch(url, options.fetchOptions);
                const data = await response.json();

                if (response.ok) {
                    successCount++;
                    responseDiv.className = 'response success';
                    responseDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    errorCount++;
                    responseDiv.className = 'response error';
                    responseDiv.textContent = `Error ${response.status}:\n${JSON.stringify(data, null, 2)}`;
                }

                updateStats();
                return data;
            } catch (error) {
                errorCount++;
                responseDiv.className = 'response error';
                responseDiv.textContent = `Request failed: ${error.message}`;
                updateStats();
                throw error;
            }
        }

        async function checkHealth() {
            try {
                const data = await makeRequest(`${API_BASE}/health`, {
                    responseDiv: document.getElementById('health-response')
                });

                if (data.status === 'healthy') {
                    document.getElementById('api-status').textContent = '● Online';
                    document.getElementById('api-status').className = 'status';
                }
            } catch (error) {
                document.getElementById('api-status').textContent = '● Offline';
                document.getElementById('api-status').className = 'status offline';
            }
        }

        async function getApiInfo() {
            await makeRequest(`${API_BASE}/`, {
                responseDiv: document.getElementById('info-response')
            });
        }

        async function listProjects() {
            await makeRequest(`${API_BASE}/projects`, {
                responseDiv: document.getElementById('projects-response')
            });
        }

        async function createProject() {
            const name = document.getElementById('project-name').value || 'Test Project';

            // Create a minimal FastAPI project
            const code = `from fastapi import FastAPI
app = FastAPI()

@app.get("/")
def health():
    return {"status": "ok"}
`;

            // Create ZIP manually (simplified - just send base64 encoded code)
            const zipData = btoa(code);

            const data = await makeRequest(`${API_BASE}/projects`, {
                responseDiv: document.getElementById('create-response'),
                fetchOptions: {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        source_type: 'zip',
                        zip_data: zipData
                    })
                }
            });

            if (data.project_id) {
                lastProjectId = data.project_id;
            }
        }

        async function testSecrets() {
            if (!lastProjectId) {
                document.getElementById('secrets-response').style.display = 'block';
                document.getElementById('secrets-response').className = 'response error';
                document.getElementById('secrets-response').textContent = 'Create a project first!';
                return;
            }

            await makeRequest(`${API_BASE}/projects/${lastProjectId}/secrets`, {
                responseDiv: document.getElementById('secrets-response')
            });
        }

        async function testContext() {
            if (!lastProjectId) {
                document.getElementById('context-response').style.display = 'block';
                document.getElementById('context-response').className = 'response error';
                document.getElementById('context-response').textContent = 'Create a project first!';
                return;
            }

            const url = document.getElementById('context-url').value;

            await makeRequest(`${API_BASE}/projects/${lastProjectId}/context`, {
                responseDiv: document.getElementById('context-response'),
                fetchOptions: {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        name: 'test-context'
                    })
                }
            });
        }
    </script>
</body>
</html>
