# Supabase Configuration for Runtime
# See: https://supabase.com/docs/guides/cli/config

project_id = "runit"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://65.21.90.216:3000"
additional_redirect_urls = ["http://localhost:3000", "http://127.0.0.1:3000", "http://65.21.90.216:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# enable_anonymous_sign_ins = false (removed - not supported in this CLI version)

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false

[auth.external.github]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

# [edge_runtime] removed - not supported in this CLI version

[analytics]
enabled = false
